name: Release Linux Build

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags (v0.1.0, v0.2.0, etc.)

jobs:
  # Step 1: Build PyInstaller binary for Linux
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
      
      - name: Build with PyInstaller
        run: |
          pyinstaller \
            --onefile \
            --name=gnome-extra-tools \
            --add-data "assets:assets" \
            --runtime-tmpdir /var/tmp \
            app.py
      
      - name: Create release directory
        run: mkdir -p release
      
      - name: Package binary and assets
        run: |
          cd dist
          tar -czf gnome-extra-tools-linux-${{ github.ref_name }}.tar.gz gnome-extra-tools
          mv gnome-extra-tools-linux-${{ github.ref_name }}.tar.gz ../release/
      
      - name: Debug - List release files
        run: |
          echo "=== Files in release/ ==="
          ls -lah release/
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gnome-extra-tools-linux
          path: release/
          retention-days: 1

  # Step 2: Create GitHub Release with binary
  create-release:
    needs: build-linux
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
      
      - name: Debug - List downloaded artifacts
        run: |
          echo "=== Files in release-artifacts/ ==="
          ls -lah release-artifacts/ 
          echo "=== Recursive search ==="
          find release-artifacts/ -type f 2>/dev/null
      
      - name: Prepare release notes
        id: notes
        run: |
          echo "Release ${{ github.ref_name }}" > RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "## GNOME Extra Tools - Linux Binary" >> RELEASE_NOTES.md
          echo "Download the pre-built binary for Linux:" >> RELEASE_NOTES.md
          echo "- **Linux**: gnome-extra-tools-linux-*.tar.gz" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "### Installation" >> RELEASE_NOTES.md
          echo "\`\`\`bash" >> RELEASE_NOTES.md
          echo "tar -xzf gnome-extra-tools-linux-*.tar.gz" >> RELEASE_NOTES.md
          echo "./gnome-extra-tools" >> RELEASE_NOTES.md
          echo "\`\`\`" >> RELEASE_NOTES.md
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: RELEASE_NOTES.md
          files: |
            release-artifacts/**/*.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
