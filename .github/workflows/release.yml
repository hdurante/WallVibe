name: Release Linux Build

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags (v0.1.0, v0.2.0, etc.)

jobs:
  # Step 1: Build PyInstaller binary for Linux (Lightweight version)
  build-linux-lightweight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
      
      - name: Build with PyInstaller (Lightweight)
        run: |
          # Build unified executable (GUI by default, --daemon for background)
          pyinstaller \
            --onefile \
            --name=wallvibe \
            --runtime-tmpdir /var/tmp \
            app.py

      - name: Prepare lightweight package layout
        run: |
          rm -rf package-lightweight
          mkdir -p package-lightweight
          cp dist/wallvibe package-lightweight/
          cp config.json package-lightweight/
          cp README.md package-lightweight/
          cp -r assets package-lightweight/
          cp -r locale package-lightweight/
      
      - name: Create release directory
        run: mkdir -p release
      
      - name: Package binary (Lightweight)
        run: |
          cd package-lightweight
          tar -czf ../release/wallvibe-linux-${{ github.ref_name }}.tar.gz .

      - name: Generate SHA256 (Lightweight)
        run: |
          cd release
          sha256sum wallvibe-linux-${{ github.ref_name }}.tar.gz > wallvibe-linux-${{ github.ref_name }}.tar.gz.sha256
      
      - name: Upload lightweight artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wallvibe-linux-lightweight
          path: release/
          retention-days: 1

  # Step 1b: Build PyInstaller binary for Linux (Complete version with Wallpaper)
  build-linux-complete:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
      
      - name: Build with PyInstaller (Complete)
        run: |
          # Build unified executable (GUI by default, --daemon for background)
          pyinstaller \
            --onefile \
            --name=wallvibe \
            --runtime-tmpdir /var/tmp \
            app.py

      - name: Prepare complete package layout
        run: |
          rm -rf package-complete
          mkdir -p package-complete
          cp dist/wallvibe package-complete/
          cp config.json package-complete/
          cp README.md package-complete/
          cp -r assets package-complete/
          cp -r locale package-complete/
          mkdir -p package-complete/Wallpaper/Debian package-complete/Wallpaper/RHEL package-complete/Wallpaper/Ubuntu package-complete/Wallpaper/Fedora package-complete/Wallpaper/SuSE
          if [ -d Wallpaper ]; then
            cp -a Wallpaper/. package-complete/Wallpaper/
          fi
      
      - name: Create release directory
        run: mkdir -p release
      
      - name: Package binary with Wallpaper examples (Complete)
        run: |
          cd package-complete
          tar -czf ../release/wallvibe-linux-complete-${{ github.ref_name }}.tar.gz .

      - name: Generate SHA256 (Complete)
        run: |
          cd release
          sha256sum wallvibe-linux-complete-${{ github.ref_name }}.tar.gz > wallvibe-linux-complete-${{ github.ref_name }}.tar.gz.sha256
      
      - name: Upload complete artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wallvibe-linux-complete
          path: release/
          retention-days: 1

  # Step 2: Create GitHub Release with binary
  create-release:
    needs: [build-linux-lightweight, build-linux-complete]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
      
      - name: Prepare release notes
        id: notes
        run: |
          echo "Release ${{ github.ref_name }}" > RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "## Linux Wallpaper Vibe - Linux Binary" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "### Available Downloads" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "#### Lightweight Version (Code only)" >> RELEASE_NOTES.md
          echo "- **wallvibe-linux-\${{ github.ref_name }}.tar.gz**" >> RELEASE_NOTES.md
          echo "- **wallvibe-linux-\${{ github.ref_name }}.tar.gz.sha256**" >> RELEASE_NOTES.md
          echo "  - Minimal installation with just the application" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "#### Complete Version (With Wallpaper Examples)" >> RELEASE_NOTES.md
          echo "- **wallvibe-linux-complete-\${{ github.ref_name }}.tar.gz**" >> RELEASE_NOTES.md
          echo "- **wallvibe-linux-complete-\${{ github.ref_name }}.tar.gz.sha256**" >> RELEASE_NOTES.md
          echo "  - Includes sample wallpapers for testing" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "### Installation" >> RELEASE_NOTES.md
          echo "\`\`\`bash" >> RELEASE_NOTES.md
          echo "tar -xzf wallvibe-linux-*.tar.gz" >> RELEASE_NOTES.md
          echo "./wallvibe" >> RELEASE_NOTES.md
          echo "\`\`\`" >> RELEASE_NOTES.md
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: RELEASE_NOTES.md
          files: |
            release-artifacts/**/*.tar.gz
            release-artifacts/**/*.sha256
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
