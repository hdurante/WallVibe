name: Release Linux Build

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags (v0.1.0, v0.2.0, etc.)

jobs:
  # Step 1: Build PyInstaller binary for Linux (Lightweight version)
  build-linux-lightweight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
      
      - name: Build with PyInstaller (Lightweight)
        run: |
          pyinstaller \
            --onefile \
            --name=gnome-extra-tools \
            --add-data "assets:assets" \
            --add-data "locale:locale" \
            --runtime-tmpdir /var/tmp \
            app.py
      
      - name: Create release directory
        run: mkdir -p release
      
      - name: Package binary (Lightweight)
        run: |
          cd dist
          tar -czf gnome-extra-tools-linux-${{ github.ref_name }}.tar.gz gnome-extra-tools
          mv gnome-extra-tools-linux-${{ github.ref_name }}.tar.gz ../release/
      
      - name: Upload lightweight artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gnome-extra-tools-linux-lightweight
          path: release/
          retention-days: 1

  # Step 1b: Build PyInstaller binary for Linux (Complete version with Wallpaper)
  build-linux-complete:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
      
      - name: Build with PyInstaller (Complete)
        run: |
          pyinstaller \
            --onefile \
            --name=gnome-extra-tools \
            --add-data "assets:assets" \
            --add-data "locale:locale" \
            --add-data "Wallpaper:Wallpaper" \
            --runtime-tmpdir /var/tmp \
            app.py
      
      - name: Create release directory
        run: mkdir -p release
      
      - name: Package binary with Wallpaper examples (Complete)
        run: |
          cd dist
          tar -czf gnome-extra-tools-linux-complete-${{ github.ref_name }}.tar.gz gnome-extra-tools
          mv gnome-extra-tools-linux-complete-${{ github.ref_name }}.tar.gz ../release/
      
      - name: Upload complete artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gnome-extra-tools-linux-complete
          path: release/
          retention-days: 1

  # Step 2: Create GitHub Release with binary
  create-release:
    needs: [build-linux-lightweight, build-linux-complete]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
      
      - name: Prepare release notes
        id: notes
        run: |
          echo "Release ${{ github.ref_name }}" > RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "## GNOME Extra Tools - Linux Binary" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "### Available Downloads" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "#### Lightweight Version (Code only)" >> RELEASE_NOTES.md
          echo "- **gnome-extra-tools-linux-\${{ github.ref_name }}.tar.gz**" >> RELEASE_NOTES.md
          echo "  - Minimal installation with just the application" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "#### Complete Version (With Wallpaper Examples)" >> RELEASE_NOTES.md
          echo "- **gnome-extra-tools-linux-complete-\${{ github.ref_name }}.tar.gz**" >> RELEASE_NOTES.md
          echo "  - Includes sample wallpapers for testing" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "### Installation" >> RELEASE_NOTES.md
          echo "\`\`\`bash" >> RELEASE_NOTES.md
          echo "tar -xzf gnome-extra-tools-linux-*.tar.gz" >> RELEASE_NOTES.md
          echo "./gnome-extra-tools" >> RELEASE_NOTES.md
          echo "\`\`\`" >> RELEASE_NOTES.md
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: RELEASE_NOTES.md
          files: |
            release-artifacts/**/*.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
